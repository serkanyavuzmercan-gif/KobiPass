name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.1.0)"
        required: true
        default: "v1.1.0"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip install -r requirements.txt
          .\.venv\Scripts\python scripts\make_assets.py

      - name: Build kobiPass.exe
        shell: pwsh
        run: |
          $IconAscii = Join-Path $env:TEMP "KobiPass_icon_v2.ico"
          Copy-Item -Path "assets\icon.ico" -Destination $IconAscii -Force
          .\.venv\Scripts\pyinstaller.exe `
            --onefile `
            --windowed `
            --noupx `
            --name kobiPass `
            --icon $IconAscii `
            --version-file assets\version_info.txt `
            --add-data "assets;assets" `
            --clean `
            main.py
          $sizeMb = [math]::Round((Get-Item "dist\kobiPass.exe").Length / 1MB, 2)
          if ($sizeMb -lt 10) { throw "Exe too small ($sizeMb MB)" }
          Write-Host "Built kobiPass.exe ($sizeMb MB)"

      - name: Build MSIX (Store package, unsigned)
        shell: pwsh
        run: |
          # Etiket 'v1.2.1' -> MSIX surumu '1.2.1.0' (Store 4. haneyi/revision 0 ister).
          $num = "${{ inputs.version }}".TrimStart('v')
          $parts = @($num.Split('.'))
          while ($parts.Count -lt 4) { $parts += '0' }
          $msixVer = ($parts[0..3] -join '.')
          Write-Host "MSIX surumu: $msixVer"
          # Store yuklemede imza Partner Center tarafindan atilir -> -SkipSign.
          .\build_msix.ps1 -Version $msixVer -SkipSign
          $msix = Get-ChildItem "dist\KobiPass-*.msix" | Select-Object -First 1
          if (-not $msix) { throw "MSIX uretilemedi" }
          Write-Host "Built $($msix.Name) ($([math]::Round($msix.Length / 1MB, 2)) MB)"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: KobiPass ${{ inputs.version }}
          files: |
            dist/kobiPass.exe
            dist/KobiPass-*.msix
          generate_release_notes: true
          draft: false
          prerelease: false
